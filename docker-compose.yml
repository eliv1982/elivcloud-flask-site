services:
  web:
    build: .
    container_name: elivcloud-site
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./instance:/app/instance
    ports:
      - "5000:5000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_n8n_network"
      - "traefik.http.routers.elivcloud.rule=Host(`elivcloud.org`) || Host(`www.elivcloud.org`)"
      - "traefik.http.routers.elivcloud.entrypoints=websecure"
      - "traefik.http.routers.elivcloud.tls=true"
      - "traefik.http.routers.elivcloud.tls.certresolver=letsencrypt"
      - "traefik.http.services.elivcloud.loadbalancer.server.port=5000"
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: n8n_n8n_network
